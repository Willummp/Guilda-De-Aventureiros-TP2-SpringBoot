# Configuração para o Banco de Dados na AWS (Apresentação)
# Para usar este arquivo, rode: mvn spring-boot:run -Dspring.profiles.active=aws

# Substitua os valores abaixo com os dados que o professor passar:
spring.datasource.url=jdbc:postgresql://IP_DA_AWS_AQUI:5432/postgres
spring.datasource.username=usuario_da_banca
spring.datasource.password=senha_secreta

# Mantém a política de não alterar o banco legado
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
